<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Название проекта</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <div class="container">
        <div class="hero-text">
            <h1>Заголовок</h1>
            <p>Подзаголовок</p>
            <button>Оставить заявку</button>
        </div>
        <div class="hero-image">
            <img src="img/hero.jpg" alt="Картинка">
        </div>
    </div>
</header>

<section class="about">
    <h2>О нас</h2>
    <p>Текст о компании</p>
</section>

<section class="advantages">
    <h2>Преимущества</h2>
    <div class="cards">
        <div class="card">Преимущество 1</div>
        <div class="card">Преимущество 2</div>
        <div class="card">Преимущество 3</div>
    </div>
</section>

<section class="steps">
    <h2>Как это работает</h2>
    <div class="step">Шаг 1</div>
    <div class="step">Шаг 2</div>
    <div class="step">Шаг 3</div>
</section>

<section class="reviews">
    <h2>Отзывы</h2>
    <div class="review">Отзыв 1</div>
    <div class="review">Отзыв 2</div>
</section>

<section class="pricing">
    <h2>Тарифы</h2>
    <div class="price-card">Тариф 1</div>
    <div class="price-card">Тариф 2</div>
</section>

<section class="contact">
    <h2>Оставить заявку</h2>
    <form>
        <input type="text" placeholder="Имя">
        <input type="email" placeholder="Email">
        <button type="submit">Отправить</button>
    </form>
</section>

<footer>
    <p>© 2026 Название компании</p>
</footer>

</body>
</html>
